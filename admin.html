<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel — Complaint Registry</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

<nav>
  <a class="nav-brand" href="index.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414A1 1 0 0119 9.414V19a2 2 0 01-2 2z"/>
    </svg>
    Complaint Registry
  </a>
  <div class="nav-links">
    <a href="index.html">Submit</a>
    <a href="admin.html" class="active">Admin</a>
    <a href="agent.html">Agent</a>
  </div>
</nav>

<div class="page-wide">
  <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:1.5rem; flex-wrap:wrap; gap:1rem;">
    <div>
      <h1 class="page-title">Admin Panel</h1>
      <p class="page-sub" style="margin-bottom:0;">Manage and assign all incoming complaints</p>
    </div>
    <button class="btn btn-outline btn-sm" onclick="loadAll()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.51"></path></svg>
      Refresh
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid">
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="sTotal">—</div></div>
    <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value amber" id="sPending">—</div></div>
    <div class="stat-card"><div class="stat-label">Assigned</div><div class="stat-value blue" id="sAssigned">—</div></div>
    <div class="stat-card"><div class="stat-label">Resolved</div><div class="stat-value green" id="sResolved">—</div></div>
  </div>

  <!-- Filters -->
  <div class="card" style="margin-bottom:1.5rem; padding: 1rem 1.25rem;">
    <div style="display:flex; gap:10px; align-items:center; flex-wrap:wrap;">
      <select id="filterStatus" onchange="applyFilter()" style="width:auto; min-width:140px;">
        <option value="">All statuses</option>
        <option value="Pending">Pending</option>
        <option value="Assigned">Assigned</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
      </select>
      <select id="filterPriority" onchange="applyFilter()" style="width:auto; min-width:140px;">
        <option value="">All priorities</option>
        <option value="High">High</option>
        <option value="Medium">Medium</option>
        <option value="Low">Low</option>
      </select>
      <input type="text" id="filterSearch" placeholder="Search by name or title…" oninput="applyFilter()" style="flex:1; min-width:180px;" />
    </div>
  </div>

  <!-- Table -->
  <div class="card" style="padding:0;">
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Submitted by</th>
            <th>Complaint</th>
            <th>Priority</th>
            <th>Status</th>
            <th>Assigned to</th>
            <th>Date</th>
            <th>Assign</th>
          </tr>
        </thead>
        <tbody id="complaintsTable">
          <tr><td colspan="7"><div class="empty"><p>Loading…</p></div></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- Assign Modal -->
<div id="modalOverlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.35); z-index:100; align-items:center; justify-content:center;">
  <div style="background:#fff; border-radius:16px; padding:2rem; width:380px; max-width:90vw; box-shadow:0 20px 60px rgba(0,0,0,0.2);">
    <h2 style="font-size:17px; font-weight:600; margin-bottom:4px;">Assign complaint</h2>
    <p id="modalTitle" style="font-size:13px; color:var(--ink-3); margin-bottom:1.25rem;"></p>

    <div class="form-group">
      <label>Agent name</label>
      <input type="text" id="modalAgent" placeholder="Enter agent's name" />
    </div>
    <div class="form-group">
      <label>Priority</label>
      <select id="modalPriority">
        <option value="Low">Low</option>
        <option value="Medium" selected>Medium</option>
        <option value="High">High</option>
      </select>
    </div>

    <div style="display:flex; gap:10px; margin-top:0.5rem;">
      <button class="btn btn-primary" onclick="confirmAssign()" style="flex:1;">Assign</button>
      <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
  const API = '/api/complaints';
  let allComplaints = [];
  let activeId = null;

  async function loadAll() {
    try {
      const [complaints, stats] = await Promise.all([
        fetch(API).then(r => r.json()),
        fetch(`${API}/stats/summary`).then(r => r.json())
      ]);
      allComplaints = complaints;
      updateStats(stats);
      applyFilter();
    } catch (err) {
      document.getElementById('complaintsTable').innerHTML =
        `<tr><td colspan="7"><div class="alert alert-error">Failed to load complaints.</div></td></tr>`;
    }
  }

  function updateStats(s) {
    document.getElementById('sTotal').textContent    = s.total;
    document.getElementById('sPending').textContent  = s.pending;
    document.getElementById('sAssigned').textContent = s.assigned;
    document.getElementById('sResolved').textContent = s.resolved;
  }

  function applyFilter() {
    const status   = document.getElementById('filterStatus').value;
    const priority = document.getElementById('filterPriority').value;
    const search   = document.getElementById('filterSearch').value.toLowerCase();

    const filtered = allComplaints.filter(c => {
      if (status   && c.status   !== status)   return false;
      if (priority && c.priority !== priority) return false;
      if (search && !c.name.toLowerCase().includes(search) && !c.complaint.toLowerCase().includes(search)) return false;
      return true;
    });
    renderTable(filtered);
  }

  function badgeClass(status) {
    const map = { Pending: 'badge-pending', Assigned: 'badge-assigned', 'In Progress': 'badge-progress', Resolved: 'badge-resolved' };
    return map[status] || 'badge-pending';
  }
  function priorityClass(p) {
    return { High: 'priority-high', Medium: 'priority-medium', Low: 'priority-low' }[p] || 'priority-medium';
  }

  function renderTable(list) {
    const tbody = document.getElementById('complaintsTable');
    if (!list.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="empty"><p>No complaints match the current filters.</p></div></td></tr>`;
      return;
    }
    tbody.innerHTML = list.map(c => `
      <tr>
        <td>
          <div style="font-weight:500; color:var(--ink);">${c.name}</div>
          <div style="font-size:12px; color:var(--ink-3);">${c.email}</div>
        </td>
        <td>
          <div style="font-weight:500; color:var(--ink); max-width:200px;">${c.complaint}</div>
          <div style="font-size:12px; color:var(--ink-3); max-width:200px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.description}</div>
        </td>
        <td><span class="badge ${priorityClass(c.priority)}">${c.priority || 'Medium'}</span></td>
        <td><span class="badge ${badgeClass(c.status)}">${c.status}</span></td>
        <td style="color:${c.assignedTo ? 'var(--ink)' : 'var(--ink-3)'}; font-size:13px;">${c.assignedTo || 'Unassigned'}</td>
        <td style="font-size:12px; color:var(--ink-3);">${new Date(c.createdAt).toLocaleDateString('en-IN', {day:'numeric',month:'short',year:'numeric'})}</td>
        <td>
          <button class="btn btn-sm btn-outline" onclick="openModal('${c._id}','${c.complaint.replace(/'/g,"\\'")}','${c.priority || 'Medium'}')">
            Assign
          </button>
        </td>
      </tr>
    `).join('');
  }

  function openModal(id, title, priority) {
    activeId = id;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalPriority').value = priority;
    document.getElementById('modalAgent').value = '';
    document.getElementById('modalOverlay').style.display = 'flex';
    setTimeout(() => document.getElementById('modalAgent').focus(), 50);
  }

  function closeModal() {
    document.getElementById('modalOverlay').style.display = 'none';
    activeId = null;
  }

  async function confirmAssign() {
    const agent    = document.getElementById('modalAgent').value.trim();
    const priority = document.getElementById('modalPriority').value;
    if (!agent) { document.getElementById('modalAgent').focus(); return; }

    try {
      const res = await fetch(`${API}/${activeId}/assign`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ assignedTo: agent, priority })
      });
      if (!res.ok) throw new Error();
      closeModal();
      loadAll();
    } catch (err) {
      alert('Failed to assign. Please try again.');
    }
  }

  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });

  loadAll();
</script>

</body>
</html>
